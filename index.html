<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>WebGIS Chi Lăng - Vương Thị Kim Anh</title>

        <link rel="stylesheet" href="leaflet.css">
        <style>
            html, body, #map { width: 100%; height: 100%; padding: 0; margin: 0; }
            h1 { 
                position: absolute; z-index: 1000; width: 100%; 
                background: rgba(255,255,255,0.8); text-align: center; 
                margin: 0; padding: 10px; font-size: 18px; font-family: sans-serif;
            }
            /* Style cho Bảng chú thích (Legend) */
            .legend {
                padding: 10px; font: 14px Arial; background: rgba(255,255,255,0.9);
                box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; line-height: 20px;
            }
            .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.8; }
            
            /* Style cho Tên xã (Label) */
            .leaflet-tooltip.label-xa {
                background: transparent; border: none; box-shadow: none;
                font-weight: bold; color: black; text-shadow: 1px 1px 2px white;
            }
        </style>
    </head>
    <body>
        <h1>WebGIS Q2 midterm2 của Vương Thị Kim Anh - 2106080018</h1>
        <div id="map"></div>

        <script src="leaflet.js"></script>
        <script src="Chilang_Pop_dens_0.js"></script>
        <script src="Chilang_District_4.js"></script>

        <script>
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).fitBounds([[21.488, 106.401],[21.826, 106.846]]);
        
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Hàm định nghĩa dải màu
        function getColor(d) {
            return d > 1000 ? '#800026' :
                   d > 500  ? '#bd0026' :
                   d > 200  ? '#e31a1c' :
                   d > 100  ? '#fc4e2a' :
                   d > 50   ? '#fd8d3c' :
                   d > 20   ? '#feb24c' :
                              '#ffeda0';
        }

        // Lớp dữ liệu dân số + Hiện tên xã
        var layer_Pop = L.geoJson(json_Chilang_Pop_dens_0, {
            style: function(feature) {
                return {
                    fillColor: getColor(feature.properties['Density']),
                    weight: 1, opacity: 1, color: 'white', fillOpacity: 0.7
                };
            },
            onEachFeature: function (feature, layer) {
                // Ép hiển thị tên xã từ cột NAME_3
                if (feature.properties && feature.properties['NAME_3']) {
                    layer.bindTooltip(feature.properties['NAME_3'], {
                        permanent: true, direction: 'center', className: 'label-xa'
                    }).openTooltip();
                }
            }
        }).addTo(map);

        // Tạo Legend thủ công để tránh lỗi 404 layers.png
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend'),
                grades = [0, 20, 50, 100, 200, 500, 1000];
            div.innerHTML = '<b>Mật độ dân số</b><br>';
            for (var i = 0; i < grades.length; i++) {
                div.innerHTML += '<i style="background:' + getColor(grades[i] + 1) + '"></i> ' +
                    grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br>' : '+');
            }
            return div;
        };
        legend.addTo(map);

        // Viền huyện
        L.geoJson(json_Chilang_District_4, {
            style: { color: 'red', weight: 2, fillOpacity: 0 }
        }).addTo(map);
        </script>
    </body>
</html>
