<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="leaflet.css">
        <link rel="stylesheet" href="L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="qgis2web.css">
        <link rel="stylesheet" href="fontawesome-all.min.css">
        <link rel="stylesheet" href="leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        h1 {
            position: absolute;
            z-index: 1000;
            width: 100%;
            background: rgba(255,255,255,0.8);
            margin: 0;
            padding: 10px;
            font-size: 18px;
            text-align: center;
        }
        </style>
        <title>WebGIS Chi Lăng - Vương Thị Kim Anh</title>
    </head>
    <body>
        <h1>WebGIS Q2 midterm2 của Vương Thị Kim Anh - 2106080018</h1>
        <div id="map"></div>

        <script src="qgis2web_expressions.js"></script>
        <script src="leaflet.js"></script>
        <script src="L.Control.Layers.Tree.min.js"></script>
        <script src="leaflet.rotatedMarker.js"></script>
        <script src="leaflet.pattern.js"></script>
        <script src="leaflet-hash.js"></script>
        <script src="Autolinker.min.js"></script>
        <script src="rbush.min.js"></script>
        <script src="labelgun.min.js"></script>
        <script src="labels.js"></script>
        <script src="leaflet.photon.js"></script>
        
        <script src="Chilang_Pop_dens_0.js"></script>
        <script src="chi_lang_pop_1.js"></script>
        <script src="Chilang_District_4.js"></script>

        <script>
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).fitBounds([[21.488, 106.401],[21.826, 106.846]]);
        
        var hash = new L.Hash(map);

        // Lớp nền bản đồ
        var layer_OSM = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            opacity: 1.0,
            attribution: '© OpenStreetMap contributors',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        }).addTo(map);

        // Hàm thiết lập màu sắc cho Mật độ dân số (Dựa theo ảnh image_01ad2c.jpg)
        function style_Chilang_Pop(feature) {
            var d = feature.properties['Density'];
            return {
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                weight: 1.0,
                fill: true,
                fillOpacity: 0.8,
                fillColor: d > 1000 ? '#800026' :
                           d > 500  ? '#bd0026' :
                           d > 200  ? '#e31a1c' :
                           d > 100  ? '#fc4e2a' :
                           d > 50   ? '#fd8d3c' :
                           d > 20   ? '#feb24c' :
                           d > 10   ? '#fed976' :
                                      '#ffeda0'
            };
        }

        // Hiển thị lớp Mật độ dân số
        var layer_Chilang_Pop_dens_0 = new L.geoJson(json_Chilang_Pop_dens_0, {
            style: style_Chilang_Pop,
            onEachFeature: function (feature, layer) {
                var popupContent = '<b>Xã:</b> ' + (feature.properties['NAME_3'] || 'N/A') + 
                                   '<br><b>Mật độ:</b> ' + (feature.properties['Density'] || '0') + ' người/km²';
                layer.bindPopup(popupContent);
            }
        }).addTo(map);

        // Hiển thị viền huyện
        var layer_Chilang_District_4 = new L.geoJson(json_Chilang_District_4, {
            style: {
                color: 'red',
                weight: 3,
                fillOpacity: 0,
                interactive: false
            }
        }).addTo(map);

        // Chú thích lớp bản đồ
        var overlaysTree = [
            {label: "<b>Viền huyện Chi Lăng</b>", layer: layer_Chilang_District_4},
            {label: "<b>Mật độ dân số</b>", layer: layer_Chilang_Pop_dens_0}
        ];
        L.control.layers.tree(null, overlaysTree, {collapsed: false}).addTo(map);
        </script>
    </body>
</html>
